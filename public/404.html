<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Single-page app redirect for GitHub Pages
      // Stores the intended path as a query param, then loads index.html
      var path = window.location.pathname.split('/').slice(2).join('/')
      var search = window.location.search.replace(/&/g, '~and~')
      window.location.replace('/rewards/?/' + path + search)
    </script>
  </head>
  <body>
  </body>
</html>
